worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Health probe ──────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── Backend REST API  →  backend-service:8090 ────────────────
        location /api/ {
            proxy_pass         http://backend-service:8090/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── RAG Chatbot REST health  →  rag-api:8080 ─────────────────
        location /rag/health {
            proxy_pass         http://rag-api:8080/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── WebSocket streaming  →  rag-api:8080 ─────────────────────
        location /ws/ {
            proxy_pass         http://rag-api:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 300s;
        }

        # ── Static assets ─────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
